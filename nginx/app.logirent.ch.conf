# =============================================================
# app.logirent.ch - Application LogiRent (Expo Web)
# Login unique avec redirection automatique par role
# =============================================================
server {
    listen 80;
    server_name app.logirent.ch;
    return 301 https://app.logirent.ch$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.logirent.ch;

    ssl_certificate /etc/letsencrypt/live/logirent.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logirent.ch/privkey.pem;

    root /var/www/logirent;
    index index.html;

    # Desactiver le cache pour le HTML (SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache long pour les assets statiques (bundles JS/CSS avec hash)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA: toutes les routes renvoient vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
