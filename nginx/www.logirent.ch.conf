# =============================================================
# www.logirent.ch - Site vitrine public (landing page)
# =============================================================
server {
    listen 80;
    server_name www.logirent.ch logirent.ch;
    return 301 https://www.logirent.ch$request_uri;
}

server {
    listen 443 ssl http2;
    server_name logirent.ch;
    
    ssl_certificate /etc/letsencrypt/live/logirent.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logirent.ch/privkey.pem;
    
    return 301 https://www.logirent.ch$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.logirent.ch;

    ssl_certificate /etc/letsencrypt/live/logirent.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logirent.ch/privkey.pem;

    root /var/www/logirent-www;
    index index.html;

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
