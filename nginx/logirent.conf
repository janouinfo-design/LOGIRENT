# =============================================================
# www.logirent.ch - Tout-en-un (Site + App + API)
# =============================================================

# HTTP -> HTTPS
server {
    listen 80;
    server_name www.logirent.ch logirent.ch;
    return 301 https://www.logirent.ch$request_uri;
}

# logirent.ch -> www.logirent.ch
server {
    listen 443 ssl http2;
    server_name logirent.ch;

    ssl_certificate /etc/letsencrypt/live/logirent.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logirent.ch/privkey.pem;

    return 301 https://www.logirent.ch$request_uri;
}

# Site principal
server {
    listen 443 ssl http2;
    server_name www.logirent.ch;

    ssl_certificate /etc/letsencrypt/live/logirent.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logirent.ch/privkey.pem;

    # Upload max (documents, photos)
    client_max_body_size 50M;

    # API -> FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # App Expo Web
    root /var/www/logirent;
    index index.html;

    # Pas de cache sur index.html (pour que les mises a jour soient visibles)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache long pour les assets (JS/CSS avec hash)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA: toutes les routes -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
