# =============================================================
# api.logirent.ch - Backend FastAPI
# =============================================================
server {
    listen 80;
    server_name api.logirent.ch;
    return 301 https://api.logirent.ch$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.logirent.ch;

    ssl_certificate /etc/letsencrypt/live/logirent.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logirent.ch/privkey.pem;

    # Taille max upload (documents, photos)
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # CORS headers
        add_header Access-Control-Allow-Origin "https://app.logirent.ch" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
